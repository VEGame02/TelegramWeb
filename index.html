            width: 100%;

        }

        #unity-loading-bar {
            position: absolute;
            left: 50%;

            transform: translate(-50%,-50%);

    <!-- Telegram Mini App Script -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <script>

        let tg = window.Telegram.WebApp;

        if (tg) {
            tg.ready();
            tg.expand();
            console.log("Telegram WebApp Ready");
        }

        window.TelegramGameProxy = {

            ready: function () {

                if (window.Telegram && Telegram.WebApp) {
                    Telegram.WebApp.ready();
                    Telegram.WebApp.expand();
                }

                console.log("Telegram Game Ready");

            },

            sendData: function (data) {

                if (window.Telegram && Telegram.WebApp) {
                    Telegram.WebApp.sendData(data);
                }

                console.log("Data sent to Telegram:", data);

            }

        };

    </script>

</head>

<body>

    <div id="unity-container">

        <canvas id="unity-canvas"></canvas>

        <div id="unity-loading-bar">

            <div id="loading">LOADING...</div>

            <div id="unity-progress-bar-empty">
                <div id="unity-progress-bar-full"></div>
            </div>

        </div>

        <div id="unity-warning"></div>

    </div>

    <script>

        var canvas = document.querySelector("#unity-canvas");

        function unityShowBanner(msg, type) {

            var warningBanner = document.querySelector("#unity-warning");

            function updateBannerVisibility() {
                warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
            }

            var div = document.createElement('div');
            div.innerHTML = msg;
            warningBanner.appendChild(div);

            if (type == 'error') div.style = 'background:red;padding:10px;';
            else {

                if (type == 'warning') div.style = 'background:yellow;padding:10px;';

                setTimeout(function () {

                    warningBanner.removeChild(div);
                    updateBannerVisibility();

                }, 5000);

            }

            updateBannerVisibility();

        }

        var buildUrl = "Build";

        var loaderUrl = buildUrl + "/169c2446db36be63ebd9fd6c3d07314c.loader.js";

        var config = {

            dataUrl: buildUrl + "/f686966365d29954017e4681467dd835.data.unityweb",
            frameworkUrl: buildUrl + "/431ba46b970cfb5ca918b5ca8715fdd7.framework.js.unityweb",
            codeUrl: buildUrl + "/513e323984aa700b0a6381106fa9bfa2.wasm.unityweb",
            streamingAssetsUrl: "StreamingAssets",

            companyName: "DefaultCompany",
            productName: "Platform Runner",
            productVersion: "1.0",

            showBanner: unityShowBanner

        };

        document.querySelector("#unity-loading-bar").style.display = "block";

        var script = document.createElement("script");

        script.src = loaderUrl;

        script.onload = () => {

            createUnityInstance(canvas, config, (progress) => {

                document.querySelector("#unity-progress-bar-full").style.width = 100 * progress + "%";

            }).then((unityInstance) => {

                document.querySelector("#unity-loading-bar").style.display = "none";

            }).catch((message) => {

                alert(message);

            });

        };

        document.body.appendChild(script);

    </script>

</body>
